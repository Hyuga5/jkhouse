<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Catalogue | ITPF Pipes & Fittings Nepal</title>
  <meta name="description" content="ITPF Nepal product catalogue – CPVC, PPR and uPVC pipes &amp; fittings with live MRP pricing for plumbing and construction across Nepal.">
  <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  <style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#2D5A3D;--green-mid:#4A7C5F;--green-light:#E8F0EB;--green-dark:#1A3526;
  --red:#C0392B;--red-light:#FAEAE8;--red-mid:#E05C4A;
  --beige:#F5F0E8;--beige-dark:#E8E0D0;--beige-deeper:#D4C9B5;
  --white:#FFFFFF;--ink:#1C1C1A;--ink2:#4A4A47;--ink3:#8A8A85;
  --border:#DDD8CE;--radius:10px;
}
body{font-family:'Inter',sans-serif;background:var(--beige);color:var(--ink);min-height:100vh}
.page-shell{display:grid;grid-template-columns:230px 1fr;min-height:100vh}

.sidebar{background:var(--green-dark);padding:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:26px 24px 24px;border-bottom:1px solid rgba(255,255,255,0.08)}
.logo-mark{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:#fff;letter-spacing:-0.3px;line-height:1.25}
.logo-mark span{color:#A8C8B0}
.logo-sub{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px}
.sidebar-section{padding:20px 0 8px}
.sidebar-label{font-size:10px;color:rgba(255,255,255,0.25);letter-spacing:1.5px;text-transform:uppercase;padding:0 24px 10px}
.cat-btn{display:flex;align-items:center;gap:10px;padding:9px 24px;cursor:pointer;font-size:13px;font-weight:400;color:rgba(255,255,255,0.5);border:none;background:none;text-align:left;width:100%;transition:color 0.15s,background 0.15s}
.cat-btn:hover{color:#fff;background:rgba(255,255,255,0.06)}
.cat-btn.active{color:#fff;background:rgba(168,200,176,0.18);font-weight:500;border-left:3px solid #A8C8B0;padding-left:21px}
.cat-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;opacity:0.6}
.cat-btn.active .cat-dot{background:#A8C8B0;opacity:1}
.cat-count{margin-left:auto;font-size:11px;opacity:0.4}
.sidebar-footer{margin-top:auto;padding:20px 24px;border-top:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;gap:8px}
.contact-pill{display:flex;align-items:center;gap:8px;background:rgba(168,200,176,0.12);border:1px solid rgba(168,200,176,0.2);border-radius:8px;padding:10px 12px;font-size:12px;color:rgba(255,255,255,0.6);text-decoration:none}
.contact-pill svg{width:14px;height:14px;stroke:#A8C8B0;flex-shrink:0}

.main-area{display:flex;flex-direction:column;background:var(--beige)}

.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.topbar-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--ink);flex:1}
.search-wrap{position:relative;flex:1;max-width:320px}
.search-wrap input{width:100%;padding:8px 12px 8px 36px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;background:var(--beige);color:var(--ink);outline:none;transition:border-color 0.15s}
.search-wrap input:focus{border-color:var(--green-mid)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:0.35;width:16px;height:16px;pointer-events:none}
.view-toggle{display:flex;gap:2px;background:var(--beige);border:1.5px solid var(--border);border-radius:8px;padding:3px}
.vbtn{background:none;border:none;cursor:pointer;padding:5px 8px;border-radius:6px;color:var(--ink3);display:flex;align-items:center;transition:all 0.15s}
.vbtn.active{background:var(--white);color:var(--green)}
.vbtn svg{width:16px;height:16px}

.hero-bar{background:var(--green);padding:30px 28px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
.hero-tag{display:inline-block;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.8);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:10px}
.hero-bar-text h2{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#fff;line-height:1.2}
.hero-bar-text p{font-size:12px;color:rgba(255,255,255,0.6);margin-top:8px;line-height:1.65;max-width:380px}
.hero-stats{display:flex;gap:24px;flex-shrink:0}
.hstat{text-align:center;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:14px 20px}
.hstat-num{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#fff;line-height:1}
.hstat-label{font-size:10px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.5px;margin-top:4px}

.filter-bar{padding:12px 28px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);background:var(--white);flex-wrap:wrap}
.filter-chip{font-size:12px;font-weight:500;padding:5px 14px;border-radius:20px;cursor:pointer;border:1.5px solid var(--border);background:none;color:var(--ink3);font-family:'Inter',sans-serif;transition:all 0.15s}
.filter-chip:hover{border-color:var(--green-mid);color:var(--green)}
.filter-chip.active{background:var(--red);color:#fff;border-color:var(--red)}
.result-count{margin-left:auto;font-size:12px;color:var(--ink3)}

.products-area{padding:22px 28px;flex:1}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.products-list{display:flex;flex-direction:column;gap:10px}

.product-card{background:var(--white);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color 0.2s,transform 0.15s;display:flex;flex-direction:column}
.product-card:hover{border-color:var(--green-mid);transform:translateY(-2px)}
.product-img-wrap{
  width:100%;
  height:150px;
  background:var(--green-light);
  overflow:hidden;
}
.product-img-wrap img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  display:block;
}
.product-body{padding:14px 14px 14px;flex:1;display:flex;flex-direction:column}
.product-cat{font-size:10px;font-weight:600;color:var(--red);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.product-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--ink);line-height:1.25;margin-bottom:6px}
.product-desc{font-size:12px;color:var(--ink3);line-height:1.55;flex:1;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.size-row{display:flex;gap:6px;margin-bottom:10px}
.size-select{flex:1;padding:6px 8px;border:1.5px solid var(--border);border-radius:7px;font-size:11.5px;font-family:'Inter',sans-serif;background:var(--beige);color:var(--ink);outline:none;cursor:pointer}
.size-select:focus{border-color:var(--green-mid)}
.product-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;gap:6px}
.price-badge{font-size:13px;font-weight:700;color:var(--green);background:var(--green-light);padding:4px 10px;border-radius:20px;flex-shrink:0;white-space:nowrap}
.enquire-btn{font-size:11px;font-weight:500;color:var(--white);background:var(--red);border:none;padding:7px 14px;border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif;transition:background 0.15s;flex-shrink:0}
.enquire-btn:hover{background:#A0302A}

.product-list-card{background:var(--white);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;display:flex;align-items:stretch;cursor:pointer;transition:border-color 0.2s}
.product-list-card:hover{border-color:var(--green-mid)}
.list-img-wrap{width:100px;min-height:90px;background:var(--green-light);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.list-img-wrap img{max-width:80%;max-height:80%;object-fit:contain}
.list-body{padding:12px 16px;flex:1;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.list-info{flex:1;min-width:160px}
.list-cat{font-size:10px;font-weight:600;color:var(--red);letter-spacing:1px;text-transform:uppercase}
.list-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--ink);margin:3px 0}
.list-desc{font-size:12px;color:var(--ink3);line-height:1.5;display:none}
.list-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.list-actions .size-select{width:140px}

.empty{text-align:center;padding:60px 20px;color:var(--ink3);grid-column:1/-1}
.empty svg{width:44px;height:44px;stroke:var(--beige-deeper);margin-bottom:12px;display:block;margin-left:auto;margin-right:auto}
.empty p{font-size:14px}

/* Product Detail View */
.detail-view{padding:30px 28px;background:var(--white);margin:24px;border-radius:16px;border:1.5px solid var(--border);display:grid;grid-template-columns:1fr 1.2fr;gap:40px}
.detail-img-box{background:var(--green-light);border-radius:12px;border:1.5px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:350px;position:relative}
.detail-img-box img{max-width:80%;max-height:80%;object-fit:contain}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--green);font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.back-btn:hover{color:var(--ink)}
.detail-cat{font-size:12px;font-weight:700;color:var(--red);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.detail-name{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--ink);margin-bottom:16px;line-height:1.2}
.detail-desc{font-size:14px;color:var(--ink2);line-height:1.7;margin-bottom:6px}
.detail-notes{font-size:12.5px;color:var(--red-mid);font-style:italic;margin-bottom:20px}
.specs-table{width:100%;border-collapse:collapse;margin-bottom:20px}
.specs-table th,.specs-table td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
.specs-table th{background:var(--beige);font-weight:600;color:var(--ink);width:40%}

.variant-section{margin-bottom:24px}
.variant-label{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}
.variant-picker{display:flex;align-items:center;gap:14px;background:var(--beige);border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:14px}
.variant-picker select{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:'Inter',sans-serif;background:var(--white);color:var(--ink);outline:none;cursor:pointer}
.variant-picker select:focus{border-color:var(--green-mid)}
.variant-price{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--green);white-space:nowrap}
.price-table{width:100%;border-collapse:collapse;margin-bottom:4px;font-size:12.5px}
.price-table th{background:var(--green-light);color:var(--green-dark);padding:8px 12px;text-align:left;font-weight:700}
.price-table td{padding:7px 12px;border-bottom:1px solid var(--border)}
.price-table tr:last-child td{border-bottom:none}
.price-table .price-col{font-weight:700;color:var(--green)}
.see-all-toggle{font-size:12px;color:var(--green-mid);cursor:pointer;font-weight:600;margin-bottom:20px;display:inline-block}
.see-all-toggle:hover{color:var(--green)}

.action-box{background:var(--beige);padding:20px;border-radius:12px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
.action-text{font-size:13px;color:var(--ink2)}
.action-text strong{color:var(--green);font-size:15px;display:block;margin-bottom:2px}

.related-section{padding:0 28px 32px}
.related-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--ink);margin-bottom:14px}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
.related-card{background:var(--white);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color 0.2s,transform 0.15s}
.related-card:hover{border-color:var(--green-mid);transform:translateY(-2px)}
.related-img-wrap{width:100%;height:90px;background:var(--green-light);display:flex;align-items:center;justify-content:center;overflow:hidden}
.related-img-wrap img{max-width:80%;max-height:80%;object-fit:contain}
.related-body{padding:9px 11px}
.related-cat{font-size:9px;font-weight:600;color:var(--red);letter-spacing:0.5px;text-transform:uppercase}
.related-name{font-family:'Syne',sans-serif;font-size:12.5px;font-weight:700;color:var(--ink);margin:3px 0;line-height:1.3}
.related-price{font-size:12px;font-weight:700;color:var(--green)}

/* Enquiry Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,53,38,0.6);z-index:300;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.enq-modal{background:var(--white);border-radius:16px;max-width:440px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,0.3);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.enq-header{background:var(--green-dark);color:#fff;padding:20px 24px;border-radius:16px 16px 0 0;position:relative}
.enq-header .enq-tag{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#A8C8B0;margin-bottom:4px}
.enq-header h3{font-family:'Syne',sans-serif;font-size:17px;font-weight:800}
.modal-close{position:absolute;top:16px;right:18px;background:rgba(255,255,255,0.15);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:rgba(255,255,255,0.3)}
.enq-form{padding:22px 24px}
.enq-form label{display:block;font-size:12px;font-weight:600;margin-bottom:5px;color:var(--ink2)}
.enq-form input,.enq-form textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;background:var(--beige);margin-bottom:14px;outline:none;color:var(--ink)}
.enq-form input:focus,.enq-form textarea:focus{border-color:var(--green-mid)}
.enq-form textarea{height:80px;resize:vertical}
.enq-submit{width:100%;padding:11px;background:var(--red);color:#fff;font-weight:700;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-family:'Inter',sans-serif;transition:background .15s}
.enq-submit:hover{background:#A0302A}

@media (max-width:860px){
  .page-shell{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;flex-direction:row;overflow-x:auto;white-space:nowrap;align-items:center}
  .sidebar-logo{border-bottom:none;border-right:1px solid rgba(255,255,255,0.08);flex-shrink:0}
  .sidebar-section{display:flex;padding:0 8px}
  .sidebar-label{display:none}
  .cat-btn{width:auto;white-space:nowrap}
  .cat-btn.active{border-left:none;border-bottom:3px solid #A8C8B0;padding-left:24px}
  .sidebar-footer{display:none}
  .detail-view{grid-template-columns:1fr;margin:14px}
  .hero-stats{display:none}
}
@media (max-width:600px){
  .topbar{padding:12px 16px}
  .products-area{padding:16px}
  .filter-bar{padding:10px 16px}
  .hero-bar{padding:22px 16px}
  .related-section{padding:0 16px 24px}
  .list-desc{display:none}
}
</style>
</head>
<body>
<div class="page-shell">
  <aside class="sidebar">
    <a href="#" onclick="goHome(event)" style="text-decoration:none;color:inherit">
      <div class="sidebar-logo">
        <div class="logo-mark">ITP<span>F</span></div>
        <div class="logo-sub">Pipes &amp; Fittings · Nepal</div>
      </div>
    </a>
    <div class="sidebar-section">
      <div class="sidebar-label">Categories</div>
      <button class="cat-btn active" data-cat="All" onclick="filterCat(this,'All')"><span class="cat-dot"></span>All products<span class="cat-count" id="cnt-All"></span></button>
      <button class="cat-btn" data-cat="CPVC" onclick="filterCat(this,'CPVC')"><span class="cat-dot"></span>CPVC<span class="cat-count" id="cnt-CPVC"></span></button>
      <button class="cat-btn" data-cat="PPR" onclick="filterCat(this,'PPR')"><span class="cat-dot"></span>PPR<span class="cat-count" id="cnt-PPR"></span></button>
      <button class="cat-btn" data-cat="PVC" onclick="filterCat(this,'PVC')"><span class="cat-dot"></span>PVC / uPVC<span class="cat-count" id="cnt-PVC"></span></button>
    </div>
    <div class="sidebar-footer">
      <a class="contact-pill" href="tel:+97716607154333">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/></svg>
        16607154333
      </a>
      <a class="contact-pill" href="mailto:itpf@intertech.com.np">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
        Email us
      </a>
    </div>
  </aside>
  <div class="main-area" id="main-content-wrapper"></div>
</div>

<!-- Enquiry Modal -->
<div class="modal-overlay" id="enquiryModal" onclick="closeEnqModal(event)">
  <div class="enq-modal" onclick="event.stopPropagation()">
    <div class="enq-header">
      <button class="modal-close" onclick="closeEnqModal(true)">✕</button>
      <div class="enq-tag">Quote Request</div>
      <h3 id="eqTitle">Send Enquiry</h3>
    </div>
    <div class="enq-form">
      <label>Your Name *</label>
      <input type="text" id="eqName" placeholder="Full name">
      <label>Phone / WhatsApp *</label>
      <input type="tel" id="eqPhone" placeholder="+977-">
      <label>Email</label>
      <input type="email" id="eqEmail" placeholder="email@example.com">
      <label>Product &amp; Size</label>
      <input type="text" id="eqProduct" placeholder="">
      <label>Message / Quantity</label>
      <textarea id="eqMessage" placeholder="Describe your requirement, quantity needed, delivery location…"></textarea>
      <button class="enq-submit" onclick="submitEnquiry()">Send via Email</button>
    </div>
  </div>

const catLabels={All:'All products',CPVC:'CPVC pipes & fittings',PPR:'PPR pipes & fittings',PVC:'PVC / uPVC pipes & fittings'};
const catTags={CPVC:'CPVC Solutions',PPR:'PPR Solutions',PVC:'PVC / uPVC Solutions'};
let currentCat='All',currentView='grid',searchQ='',selectedProductId=null;

function getFiltered(){
  return PRODUCTS.filter(p=>{
    const catOk=currentCat==='All'||p.category===currentCat;
    const q=searchQ.toLowerCase();
    return catOk&&(!q||p.name.toLowerCase().includes(q)||p.description.toLowerCase().includes(q)||p.category.toLowerCase().includes(q)||p.specs.some(s=>s.toLowerCase().includes(q)));
  });
}

function pipeSVG(){return `<svg fill="none" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5m8.25 3v6.75m0 0l-3-3m3 3l3-3M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/></svg>`}

function fmtPrice(v){ return v ? 'NPR ' + v.toLocaleString() : 'Call for price'; }

function sizeOptionsHTML(p, selectedIdx){
  return p.variants.map((v,i)=>`<option value="${i}" ${i===selectedIdx?'selected':''}>${v.size}${v.price? ' – NPR '+v.price.toLocaleString() : ''}</option>`).join('');
}

function renderGrid(list){
  return list.map(p=>{
    const price = p.variants[0] ? p.variants[0].price : null;
    return `
    <div class="product-card" onclick="selectProduct(${p.id})">
      <div class="product-img-wrap"><img src="${p.img}" alt="${p.name}" loading="lazy"></div>
      <div class="product-body">
        <div class="product-cat">${p.category}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.description}</div>
        <div class="size-row" onclick="event.stopPropagation()">
          <select class="size-select" id="gsel-${p.id}" onchange="updateGridPrice(${p.id})">
            ${sizeOptionsHTML(p, 0)}
          </select>
        </div>
        <div class="product-footer">
          <span class="price-badge" id="gprice-${p.id}">${fmtPrice(price)}</span>
          <button class="enquire-btn" onclick="event.stopPropagation(); enquireFromCard(${p.id})">Send Quote</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderList(list){
  return list.map(p=>{
    const price = p.variants[0] ? p.variants[0].price : null;
    return `
    <div class="product-list-card" onclick="selectProduct(${p.id})">
      <div class="list-img-wrap"><img src="${p.img}" alt="${p.name}" loading="lazy"></div>
      <div class="list-body">
        <div class="list-info">
          <div class="list-cat">${p.category}</div>
          <div class="list-name">${p.name}</div>
          <div class="list-desc">${p.description}</div>
        </div>
        <div class="list-actions" onclick="event.stopPropagation()">
          <select class="size-select" id="lsel-${p.id}" onchange="updateListPrice(${p.id})">
            ${sizeOptionsHTML(p, 0)}
          </select>
          <span class="price-badge" id="lprice-${p.id}">${fmtPrice(price)}</span>
          <button class="enquire-btn" onclick="enquireFromCard(${p.id})">Send Quote</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function updateGridPrice(id){
  const p=PRODUCTS.find(x=>x.id===id);
  const idx=+document.getElementById('gsel-'+id).value;
  document.getElementById('gprice-'+id).textContent=fmtPrice(p.variants[idx].price);
}
function updateListPrice(id){
  const p=PRODUCTS.find(x=>x.id===id);
  const idx=+document.getElementById('lsel-'+id).value;
  document.getElementById('lprice-'+id).textContent=fmtPrice(p.variants[idx].price);
}

function enquireFromCard(id){
  const p=PRODUCTS.find(x=>x.id===id);
  const sel=document.getElementById('gsel-'+id)||document.getElementById('lsel-'+id);
  const idx=sel?+sel.value:0;
  openEnquiry(id, idx);
}

function selectProduct(id){
  selectedProductId=id;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}
function closeDetail(){
  selectedProductId=null;
  render();
}
function goHome(e){
  e.preventDefault();
  selectedProductId=null;
  currentCat='All';
  searchQ='';
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.cat-btn[data-cat="All"]').classList.add('active');
  render();
}

function generateSpecsRows(specs){
  return specs.map(s=>{
    const parts=s.split(':');
    if(parts.length>1){
      const k=parts[0].trim(); const v=parts.slice(1).join(':').trim();
      return `<tr><th>${k}</th><td>${v}</td></tr>`;
    }
    return `<tr><th colspan="2">${s}</th></tr>`;
  }).join('');
}

function priceTableRows(variants){
  return variants.map(v=>`<tr><td>${v.size}</td><td class="price-col">${v.price? 'NPR '+v.price.toLocaleString() : '—'}</td></tr>`).join('');
}

function updateDetailPrice(id){
  const p=PRODUCTS.find(x=>x.id===id);
  const idx=+document.getElementById('detail-size-select').value;
  document.getElementById('detail-price').textContent=fmtPrice(p.variants[idx].price);
}

function renderRelated(p){
  const pool=PRODUCTS.filter(x=>x.category===p.category&&x.id!==p.id);
  const sample=pool.slice().sort(()=>Math.random()-0.5).slice(0,4);
  if(!sample.length) return '';
  return `
    <div class="related-section">
      <div class="related-title">You may also like</div>
      <div class="related-grid">
        ${sample.map(r=>`
          <div class="related-card" onclick="selectProduct(${r.id})">
            <div class="related-img-wrap"><img src="${r.img}" alt="${r.name}" loading="lazy"></div>
            <div class="related-body">
              <div class="related-cat">${r.category}</div>
              <div class="related-name">${r.name}</div>
              <div class="related-price">${fmtPrice(r.variants[0]?.price)}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}

function render(){
  const wrapper=document.getElementById('main-content-wrapper');

  if(selectedProductId){
    const product=PRODUCTS.find(p=>p.id===selectedProductId);
    const manyVariants = product.variants.length > 6;
    wrapper.innerHTML=`
      <div class="topbar">
        <button class="back-btn" onclick="closeDetail()">
          <svg style="width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
          Back to catalogue
        </button>
        <div class="topbar-title" style="margin-left:20px">${product.name}</div>
      </div>

      <div class="detail-view">
        <div class="detail-img-box">
          <img src="${product.img}" alt="${product.name}">
        </div>
        <div>
          <div class="detail-cat">${catTags[product.category]||product.category}</div>
          <h2 class="detail-name">${product.name}</h2>
          <p class="detail-desc">${product.description}</p>
          ${product.notes ? `<p class="detail-notes">${product.notes}</p>` : ''}

          <table class="specs-table">${generateSpecsRows(product.specs)}</table>

          <div class="variant-section">
            <div class="variant-label">Choose size / variant</div>
            <div class="variant-picker">
              <select id="detail-size-select" onchange="updateDetailPrice(${product.id})">
                ${sizeOptionsHTML(product, 0)}
              </select>
              <div class="variant-price" id="detail-price">${fmtPrice(product.variants[0]?.price)}</div>
            </div>
            ${manyVariants ? `<span class="see-all-toggle" onclick="togglePriceTable()">See full price list ▾</span>
            <table class="price-table" id="full-price-table" style="display:none">
              <thead><tr><th>Size / Variant</th><th>MRP (NPR)</th></tr></thead>
              <tbody>${priceTableRows(product.variants)}</tbody>
            </table>` : `
            <table class="price-table">
              <thead><tr><th>Size / Variant</th><th>MRP (NPR)</th></tr></thead>
              <tbody>${priceTableRows(product.variants)}</tbody>
            </table>`}
          </div>

          <div class="action-box">
            <div class="action-text">
              <strong>MRP inclusive of 13% VAT</strong>
              Get instant pricing quotes for hardware outlets or sites across Nepal.
            </div>
            <button class="enquire-btn" style="padding:12px 24px;font-size:13px;border-radius:8px" onclick="openEnquiry(${product.id})">Send Quote</button>
          </div>
        </div>
      </div>
      ${renderRelated(product)}
    `;
    return;
  }

  wrapper.innerHTML=`
    <div class="topbar">
      <div class="topbar-title" id="page-title">All products</div>
      <div class="search-wrap">
        <svg class="search-icon" fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 15.803 7.5 7.5 0 0015.803 15.803z"/></svg>
        <input type="text" id="search-input" value="${searchQ}" placeholder="Search products..." oninput="handleSearch()">
      </div>
      <div class="view-toggle">
        <button class="vbtn ${currentView==='grid'?'active':''}" id="vbtn-grid" onclick="setView('grid')">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/></svg>
        </button>
        <button class="vbtn ${currentView==='list'?'active':''}" id="vbtn-list" onclick="setView('list')">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zM3.75 12h.007v.008H3.75V12zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm-.375 5.25h.007v.008H3.75v-.008zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/></svg>
        </button>
      </div>
    </div>

    <div class="hero-bar">
      <div class="hero-bar-text">
        <div class="hero-tag">Nepal's trusted supplier</div>
        <h2 id="hero-title">${currentCat==='All'?'Quality pipes &amp; fittings<br>for every project':(catLabels[currentCat]||currentCat)}</h2>
        <p>Explore CPVC, PPR and PVC / uPVC pipes and fittings from ITPF Nepal — Maxflow CPVC and ITPF Brand PPR &amp; uPVC systems for plumbing, drainage and construction across Nepal.</p>
      </div>
      <div class="hero-stats">
        <div class="hstat">
          <div class="hstat-num">${PRODUCTS.length}</div>
          <div class="hstat-label">Products listed</div>
        </div>
        <div class="hstat">
          <div class="hstat-num">3</div>
          <div class="hstat-label">Product lines</div>
        </div>
      </div>
    </div>

    <div class="filter-bar">
      <button class="filter-chip ${currentCat==='All'?'active':''}" onclick="filterChip(this,'All')">All</button>
      <button class="filter-chip ${currentCat==='CPVC'?'active':''}" onclick="filterChip(this,'CPVC')">CPVC</button>
      <button class="filter-chip ${currentCat==='PPR'?'active':''}" onclick="filterChip(this,'PPR')">PPR</button>
      <button class="filter-chip ${currentCat==='PVC'?'active':''}" onclick="filterChip(this,'PVC')">PVC / uPVC</button>
      <span class="result-count" id="result-count">0 products</span>
    </div>

    <div class="products-area">
      <div class="products-grid" id="products-container"></div>
    </div>
  `;

  const list=getFiltered();
  const c=document.getElementById('products-container');

  if(currentView==='grid'){
    c.className='products-grid';
    c.innerHTML=list.length?renderGrid(list):`<div class="empty">${pipeSVG()}<p>No products found</p></div>`;
  }else{
    c.className='products-list';
    c.innerHTML=list.length?renderList(list):`<div class="empty">${pipeSVG()}<p>No products found</p></div>`;
  }

  document.getElementById('result-count').textContent=list.length+' product'+(list.length!==1?'s':'');
  const t=currentCat==='All'?'All products':(catLabels[currentCat]||currentCat);
  document.getElementById('page-title').textContent=t;
  updateSidebarCounts();
}

function updateSidebarCounts(){
  document.getElementById('cnt-All').textContent='('+PRODUCTS.length+')';
  document.getElementById('cnt-CPVC').textContent='('+PRODUCTS.filter(p=>p.category==='CPVC').length+')';
  document.getElementById('cnt-PPR').textContent='('+PRODUCTS.filter(p=>p.category==='PPR').length+')';
  document.getElementById('cnt-PVC').textContent='('+PRODUCTS.filter(p=>p.category==='PVC').length+')';
}

function togglePriceTable(){
  const t=document.getElementById('full-price-table');
  const toggle=document.querySelector('.see-all-toggle');
  if(t.style.display==='none'){t.style.display='table';toggle.textContent='Hide full price list ▴';}
  else{t.style.display='none';toggle.textContent='See full price list ▾';}
}

function filterCat(btn,cat){
  selectedProductId=null;
  currentCat=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function filterChip(chip,cat){
  currentCat=cat;
  render();
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));
}
function setView(v){ currentView=v; render(); }
function handleSearch(){
  searchQ=document.getElementById('search-input').value;
  const list=getFiltered();
  const c=document.getElementById('products-container');
  if(currentView==='grid'){
    c.innerHTML=list.length?renderGrid(list):`<div class="empty">${pipeSVG()}<p>No products found</p></div>`;
  }else{
    c.innerHTML=list.length?renderList(list):`<div class="empty">${pipeSVG()}<p>No products found</p></div>`;
  }
  document.getElementById('result-count').textContent=list.length+' product'+(list.length!==1?'s':'');
}

/* ---- Enquiry / Send Quote modal ---- */
function openEnquiry(id, variantIdx){
  const p=PRODUCTS.find(x=>x.id===id);
  let idx=variantIdx;
  if(idx===undefined){
    const sel=document.getElementById('detail-size-select');
    idx=sel?+sel.value:0;
  }
  const v=p.variants[idx]||p.variants[0];
  document.getElementById('eqTitle').textContent='Enquire: '+p.name;
  document.getElementById('eqProduct').value=p.name+' – '+(v?v.size:'');
  document.getElementById('eqMessage').value='';
  document.getElementById('eqName').value='';
  document.getElementById('eqPhone').value='';
  document.getElementById('eqEmail').value='';
  document.getElementById('enquiryModal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeEnqModal(e){
  if(e===true || (e&&e.target&&e.target.id==='enquiryModal')){
    document.getElementById('enquiryModal').classList.remove('open');
    document.body.style.overflow='';
  }
}
function submitEnquiry(){
  const name=document.getElementById('eqName').value.trim();
  const phone=document.getElementById('eqPhone').value.trim();
  const product=document.getElementById('eqProduct').value.trim();
  const msg=document.getElementById('eqMessage').value.trim();
  const email=document.getElementById('eqEmail').value.trim();
  if(!name||!phone){ alert('Please enter your name and phone number.'); return; }
  const subject=encodeURIComponent('Quote Request: '+product);
  const body=encodeURIComponent('Quote Request\n\nName: '+name+'\nPhone: '+phone+'\nEmail: '+email+'\n\nProduct: '+product+'\n\nMessage:\n'+msg+'\n\n---\nSent from ITPF Catalogue');
  window.location.href='mailto:itpf@intertech.com.np?subject='+subject+'&body='+body;
  closeEnqModal(true);
}

render();
</script>
</body>
</html>
