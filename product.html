<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Catalogue | JK House and Suppliers</title>
    <meta
      name="description"
      content="ITPF Nepal product catalogue – CPVC, PPR and uPVC pipes &amp; fittings with live MRP pricing for plumbing and construction across Nepal."
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="canonical" href="https://jkhouse.com.np/product" />
    <link rel="stylesheet" href="/css/product.css" />
    <script src="/js/product.js" defer></script>
  </head>
  <body>
    <div class="page-shell">
      <aside class="sidebar">
        <a
          href="#"
          onclick="goHome(event)"
          style="text-decoration: none; color: inherit"
        >
          <div class="sidebar-logo">
            <div class="logo-mark">JK<span>House</span></div>
            <div class="logo-sub">and Suppliers · Nepal</div>
          </div>
        </a>
        <div class="sidebar-section">
          <div class="sidebar-label">Categories</div>
          <button
            class="cat-btn active"
            data-cat="All"
            onclick="filterCat(this, 'All')"
          >
            <span class="cat-dot"></span>All products<span
              class="cat-count"
              id="cnt-All"
            ></span>
          </button>
          <button
            class="cat-btn"
            data-cat="CPVC"
            onclick="filterCat(this, 'CPVC')"
          >
            <span class="cat-dot"></span>CPVC<span
              class="cat-count"
              id="cnt-CPVC"
            ></span>
          </button>
          <button
            class="cat-btn"
            data-cat="PPR"
            onclick="filterCat(this, 'PPR')"
          >
            <span class="cat-dot"></span>PPR<span
              class="cat-count"
              id="cnt-PPR"
            ></span>
          </button>
          <button
            class="cat-btn"
            data-cat="PVC"
            onclick="filterCat(this, 'PVC')"
          >
            <span class="cat-dot"></span>PVC / uPVC<span
              class="cat-count"
              id="cnt-PVC"
            ></span>
          </button>
        </div>
        <div class="sidebar-footer">
          <a class="contact-pill" href="tel:+97716607154333">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"
              />
            </svg>
            16607154333
          </a>
          <a class="contact-pill" href="mailto:itpf@intertech.com.np">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"
              />
            </svg>
            Email us
          </a>
        </div>
      </aside>
      <div class="main-area" id="main-content-wrapper"></div>
    </div>

    <!-- Enquiry Modal -->
    <div class="modal-overlay" id="enquiryModal" onclick="closeEnqModal(event)">
      <div class="enq-modal" onclick="event.stopPropagation()">
        <div class="enq-header">
          <button class="modal-close" onclick="closeEnqModal(true)">✕</button>
          <div class="enq-tag">Quote Request</div>
          <h3 id="eqTitle">Send Enquiry</h3>
        </div>
        <div class="enq-form">
          <label>Your Name *</label>
          <input type="text" id="eqName" placeholder="Full name" />
          <label>Phone / WhatsApp *</label>
          <input type="tel" id="eqPhone" placeholder="+977-" />
          <label>Email</label>
          <input type="email" id="eqEmail" placeholder="email@example.com" />
          <label>Product &amp; Size</label>
          <input type="text" id="eqProduct" placeholder="" />
          <label>Message / Quantity</label>
          <textarea
            id="eqMessage"
            placeholder="Describe your requirement, quantity needed, delivery location…"
          ></textarea>
          <button class="enq-submit" onclick="submitEnquiry()">
            Send via Email
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
